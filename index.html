<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copa do Mundo 2026 | Mohr Print</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --panel: #ffffff;
      --ink: #17211f;
      --muted: #5b6863;
      --line: #d9ded8;
      --head: #0b5d57;
      --accent: #c9362f;
      --field: #fdfefa;
      --focus: #1f7a8c;
      --gold: #d8a10f;
      --silver: #aeb6bd;
      --bronze: #b87333;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.35;
    }
    header {
      padding: 24px 18px 18px;
      background: var(--head);
      color: #fff;
    }
    .wrap {
      width: min(1240px, calc(100% - 28px));
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: 0;
    }
    body.logged-in h1 {
      font-size: clamp(14px, 2.4vw, 23px);
    }
    .sub {
      margin: 0;
      max-width: 850px;
      color: #e7f0ed;
      font-size: 15px;
    }
    .rules-divider {
      display: block;
      width: min(520px, 100%);
      height: 1px;
      margin: 8px 0 6px;
      background: rgba(255, 255, 255, 0.35);
    }
    .rules-spacer {
      display: block;
      height: 4px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 170px 170px 190px auto auto;
      gap: 10px;
      align-items: center;
      padding: 14px 0;
    }
    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      text-transform: none;
    }
    [hidden] {
      display: none !important;
    }

    select,
    button {
